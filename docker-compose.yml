# docker-compose.yml
# Full production stack: Nginx + Gunicorn (Flask) + Redis
#
# Usage:
#   docker-compose up -d --build
#   docker-compose down

version: "3.9"

services:

  # ── Flask app (Gunicorn) ──────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FLASK_DEBUG=false
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    # App is NOT exposed directly — only through Nginx
    expose:
      - "8000"

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # Uncomment for HTTPS:
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - internal
      - external

  # ── Redis (rate limiter storage) ─────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
