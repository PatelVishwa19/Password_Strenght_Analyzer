# nginx/nginx.conf
# Production Nginx configuration for Password Strength Analyzer
# Proxies to Gunicorn on port 8000

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version
    server_tokens off;

    # Logging (no passwords ever appear in URLs — POST body is not logged)
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Rate limiting zone — 10MB shared memory, 20 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

    # Upstream Flask/Gunicorn app
    upstream flask_app {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Max body size — no password is > 1KB
        client_max_body_size 1k;

        # Security headers (complement Flask's headers)
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "DENY"                          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # Uncomment for HTTPS:
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Apply rate limiting to /analyze and /report
        location ~ ^/(analyze|report)$ {
            limit_req zone=api burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # Static files — served directly by Nginx (faster than Flask)
        location /static/ {
            proxy_pass http://flask_app;
            expires    7d;
            add_header Cache-Control "public, immutable";
        }

        # All other routes → Flask
        location / {
            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # Block access to hidden files and config
        location ~ /\. { deny all; }
    }
}
